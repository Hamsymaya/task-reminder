<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nairobi Task Reminder</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
<meta name="theme-color" content="#1e6f5c">
</head>
<body>

<header>
  <h1>Task Reminder</h1>
  <p id="status">Location: not tracking yet</p>
  <button id="startBtn">Start tracking my location</button>
</header>

<main>
  <section id="addZone">
    <h2>Create a location</h2>
    <form id="zoneForm">
      <input type="text" id="zoneName" placeholder="e.g. Gym, Client office" required>
      <button type="button" id="captureLocationBtn">📍 Use my current location</button>
      <p id="capturedCoords" class="empty">No location captured yet</p>
      <input type="number" id="zoneRadius" placeholder="Radius in meters (default 500)" min="50">
      <button type="submit" id="saveZoneBtn" disabled>Save location</button>
    </form>
    <ul id="zoneList"></ul>
  </section>

  <section id="addTask">
    <h2>Add a task</h2>
    <form id="taskForm">
      <input type="text" id="taskText" placeholder="e.g. Pick up documents" required>
      <select id="taskZone" required>
        <option value="" disabled selected>Where?</option>
      </select>
      <button type="submit">Add task</button>
    </form>
  </section>

  <section id="taskListSection">
    <h2>Your tasks</h2>
    <ul id="taskList"></ul>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
